name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger VPS deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.SALES_DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.SALES_DEPLOY_WEBHOOK_TOKEN }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_REF_VALUE: ${{ github.ref }}
        run: |
          set -euo pipefail

          DEPLOY_WEBHOOK_URL="${DEPLOY_WEBHOOK_URL:-https://salesapi.zodo.ca/__deploy/sales-crm}"

          if [ -z "${DEPLOY_WEBHOOK_TOKEN:-}" ]; then
            echo "::error::Missing required SALES_DEPLOY_WEBHOOK_TOKEN repository secret"
            exit 1
          fi

          payload="$(node -e 'const payload = { sha: process.env.GITHUB_SHA_VALUE, ref: process.env.GITHUB_REF_VALUE, runId: process.env.GITHUB_RUN_ID }; process.stdout.write(JSON.stringify(payload));')"

          echo "Triggering Sales CRM deploy webhook..."
          response=""
          for attempt in $(seq 1 6); do
            if response="$(curl -fsS --connect-timeout 20 --max-time 240 --retry 2 --retry-delay 5 --retry-all-errors -X POST "$DEPLOY_WEBHOOK_URL" \
              -H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
              -H "Content-Type: application/json" \
              --data "$payload")"; then
              break
            fi

            if [ "$attempt" = "6" ]; then
              echo "::error::Failed to reach Sales CRM deploy webhook after $attempt attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "Deploy webhook request failed. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

          echo "$response"
          deploy_run_id="$(node -e 'const input = process.argv[1]; const data = JSON.parse(input); process.stdout.write(data.run?.id || "");' "$response")"

          if [ -z "$deploy_run_id" ]; then
            echo "::error::Deploy webhook did not return a run id"
            exit 1
          fi

          status_url="${DEPLOY_WEBHOOK_URL%/deploy}/status"

          for attempt in $(seq 1 90); do
            sleep 10
            status_response="$(curl -fsS "$status_url" -H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN")"
            status="$(node -e 'const input = process.argv[1]; const id = process.argv[2]; const data = JSON.parse(input); const run = data.run || {}; if (run.id !== id) process.stdout.write("unknown"); else process.stdout.write(run.status || "unknown");' "$status_response" "$deploy_run_id")"

            echo "Deploy status: $status"

            if [ "$status" = "success" ]; then
              echo "Sales CRM deploy completed successfully."
              exit 0
            fi

            if [ "$status" = "failed" ]; then
              echo "$status_response"
              echo "::error::Sales CRM deploy failed on VPS"
              exit 1
            fi
          done

          echo "::error::Timed out waiting for Sales CRM deploy to finish"
          exit 1
