name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH password client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          VPS_HOST="${VPS_HOST:-82.197.94.229}"
          VPS_USER="${VPS_USER:-root}"
          VPS_PORT="${VPS_PORT:-22}"

          if [ -z "$VPS_PASSWORD" ]; then
            echo "::error::Missing required VPS_PASSWORD repository secret"
            exit 1
          fi

          SSH_OPTS=(
            -p "$VPS_PORT"
            -o ConnectTimeout=30
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o PreferredAuthentications=password
            -o PubkeyAuthentication=no
          )

          for attempt in 1 2 3 4 5; do
            echo "SSH deploy attempt ${attempt}/5..."
            if sshpass -p "$VPS_PASSWORD" ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" <<'DEPLOY_SCRIPT'
            set -e
            echo "Pulling latest code..."
            cd /var/www/sales-zodo-crm

            # Reset any local changes from previous deploys.
            git fetch origin main
            git reset --hard origin/main

            echo "Installing backend dependencies..."
            cd /var/www/sales-zodo-crm/backend
            rm -rf node_modules
            npm ci --include=dev

            echo "Building backend..."
            npx prisma generate
            npx prisma migrate deploy
            npm run build

            echo "Installing frontend dependencies..."
            cd /var/www/sales-zodo-crm/frontend
            rm -rf node_modules
            npm ci

            echo "Building frontend..."
            npx vite build

            echo "Restarting backend..."
            pm2 restart sales-zodo-crm-api
            pm2 save

            echo "Deployment complete!"
          DEPLOY_SCRIPT
            then
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "::error::SSH deploy failed after 5 attempts"
              exit 255
            fi

            sleep_seconds=$((attempt * 20))
            echo "SSH attempt failed. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
