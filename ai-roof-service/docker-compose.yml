version: "3.8"

services:
  ai-roof-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-roof-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - HOST=0.0.0.0
      - HEAT_IMAGE_SIZE=256
      - HEAT_CORNER_THRESH=0.01
      - HEAT_INFER_TIMES=3
    volumes:
      # Mount checkpoints from host (download separately)
      - ./heat-model/2.- TRAINING-TESTING/heat-master/checkpoints:/app/heat-model/2.- TRAINING-TESTING/heat-master/checkpoints:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:5001/health'); exit(0 if r.ok else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
