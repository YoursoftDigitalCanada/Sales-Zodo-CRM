# AI Roof Estimator — Nginx config
# Proxy pass for ai.zodo.ca → FastAPI on port 8001

server {
    listen 80;
    server_name ai.zodo.ca;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai.zodo.ca;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/ai.zodo.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.zodo.ca/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Upload limits (satellite images up to 5 MB)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for AI inference (up to 30s)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # Health check (no caching)
    location /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache";
    }
}
